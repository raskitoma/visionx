<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionX VNC Viewer</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #vnc-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #111; }
        #screen { width: 100%; height: 100%; overflow: auto; display: flex; align-items: center; justify-content: center; }
        #status { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px; z-index: 100; font-size: 13px; border-left: 3px solid #3498db; }
    </style>
</head>
<body>
    <div id="status">Initializing...</div>
    <div id="vnc-container">
        <div id="screen"></div>
    </div>

    <!-- Use local noVNC assets -->
    <script type="module">
        import RFB from './novnc/core/rfb.js';

        const params = new URLSearchParams(window.location.search);
        const host = params.get('host');
        const port = params.get('port');
        const password = params.get('password');
        const statusEl = document.getElementById('status');

        console.log("VNC Viewer starting...", { host, port, hasPassword: !!password });

        if (!host || !port) {
            statusEl.innerText = 'Error: Missing host/port';
            console.error('Missing configuration');
        } else {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${protocol}//${window.location.host}/ws/vnc/${host}/${port}`;
            
            console.log("Connecting to:", url);
            statusEl.innerText = `Connecting to ${host}...`;

            const rfb = new RFB(document.getElementById('screen'), url, {
                credentials: { password: password },
                viewOnly: true,
                focusOnClick: false
            });

            rfb.scaleViewport = true;
            rfb.resizeSession = true;
            rfb.background = "#111";

            rfb.addEventListener("connect", () => {
                console.log("RFB connected");
                statusEl.innerText = `Connected to ${host}`;
                setTimeout(() => statusEl.style.display = 'none', 3000);
            });

            rfb.addEventListener("disconnect", (e) => {
                console.log("RFB disconnected", e.detail);
                statusEl.style.display = 'block';
                const reason = e.detail.clean ? 'Clean Disconnect' : 'Connection Error';
                statusEl.innerHTML = `<strong>${reason}</strong><br/>
                                      The proxy could not reach the machine.<br/>
                                      <em>Check if VNC is running/allowed on port ${port}.</em>`;
                if (!e.detail.clean) {
                    console.error("Disconnection error:", e.detail);
                }
            });

            rfb.addEventListener("credentialsrequired", () => {
                console.log("RFB Credentials Required");
                statusEl.style.display = 'block';
                statusEl.innerText = "Password Required";
            });

            rfb.addEventListener("securityfailure", (e) => {
                console.error("RFB Security Failure:", e.detail);
                statusEl.style.display = 'block';
                statusEl.innerText = `Security Failure: ${e.detail.status}`;
            });

            rfb.addEventListener("clipboard", (e) => {
                console.log("RFB clipboard:", e.detail.text);
            });

            rfb.addEventListener("bell", () => {
                console.log("RFB bell");
            });

            rfb.addEventListener("desktopname", (e) => {
                console.log("Desktop name:", e.detail.name);
            });

            // Force close from parent message
            window.addEventListener('message', (e) => {
                if (e.data && e.data.type === 'DISCONNECT') {
                    console.log("Parent requested forced disconnect...");
                    try { rfb.disconnect(); } catch(err) {}
                }
            });

            // Guarantee release on unload
            window.addEventListener('beforeunload', () => {
                try { rfb.disconnect(); } catch(err) {}
            });
        }
    </script>
</body>
</html>
